<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Progressão</title>
<link rel="stylesheet" href="assets/style.css">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1C1913">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" href="assets/icons/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="assets/icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Academia">
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="assets/config.js"></script>
</head>
<body>

<div class="topbar">
  <div class="wrap">
    <div class="brand"><div class="belt-strip"></div><span>Academia</span></div>
    <div class="nav-links"><a href="aluno.html" class="active">Minha Progressão</a></div>
    <div class="who">
      <span id="who-name" class="mono"></span>
      <button class="btn-ghost" id="logout-btn">Sair</button>
    </div>
  </div>
</div>

<div class="page wrap">
  <div class="header-row">
    <div>
      <h1>Minha Progressão</h1>
      <div class="subtitle" id="belt-line">Carregando…</div>
    </div>
  </div>

  <div class="card" style="margin-bottom:18px;">
    <h3>Caminho de Graduação</h3>
    <div class="belt-ladder" id="belt-ladder"></div>
  </div>

  <div class="grid grid-3" style="margin-bottom:24px;" id="finance-cards"></div>

  <div class="grid grid-2">
    <div class="card">
      <h3>Mapa de Habilidades</h3>
      <canvas id="radar-chart" height="260"></canvas>
    </div>
    <div class="card">
      <h3>Evolução Geral (nível médio ao longo do tempo)</h3>
      <canvas id="timeline-chart" height="260"></canvas>
    </div>
  </div>

  <div class="card" style="margin-top:18px;">
    <h3>Detalhe por Habilidade</h3>
    <div id="skills-list"></div>
  </div>
</div>

<script>
firebase.initializeApp(window.FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.firestore();

function nextDueDate(dueDay, today){
  let due = new Date(today.getFullYear(), today.getMonth(), dueDay);
  if(due < today) due = new Date(today.getFullYear(), today.getMonth()+1, dueDay);
  return due;
}

// Data de vencimento "oficial": usa o campo next_due_date salvo pelo
// professor (editado na ficha ou avançado ao marcar como pago). Sem isso,
// esta tela recalculava a data sozinha e nunca refletia as alterações
// feitas pelo professor — por isso o vencimento não atualizava aqui.
function getNextDueDate(info, today){
  if(info && info.next_due_date && info.next_due_date.toDate) return info.next_due_date.toDate();
  return nextDueDate(info.due_day, today);
}

async function guardAndInit(user){
  const email = (user.email || '').toLowerCase();

  const profSnap = await db.collection('professors').doc(email).get();
  if(profSnap.exists){ window.location.href = 'professor.html'; return; }

  const snap = await db.collection('students').doc(email).get();
  if(!snap.exists){
    await auth.signOut();
    window.location.href = 'index.html';
    return;
  }
  const profile = { id: email, ...snap.data() };

  document.getElementById('who-name').textContent = profile.full_name || profile.email;
  const belt = profile.belt || 'Branca';
  const beltColor = window.BELT_COLORS[belt] || '#888';
  const stripesHTML = [0,1,2,3].map(i => `<i class="${i < (profile.stripes||0) ? 'on':''}"></i>`).join('');
  document.getElementById('belt-line').innerHTML =
    `<span class="belt-chip"><span class="belt-swatch" style="background:${beltColor}"></span>Faixa ${belt}<span class="stripe-tab">${stripesHTML}</span></span>`;

  const order = window.BELT_ORDER || ['Branca','Azul','Roxa','Marrom','Preta'];
  const currentIdx = order.indexOf(belt);
  document.getElementById('belt-ladder').innerHTML = order.map((b,i) => {
    const isCurrent = i === currentIdx;
    return `<div class="seg ${isCurrent?'current':''}" style="background:${window.BELT_COLORS[b]}33;">${b}</div>`;
  }).join('');

  document.getElementById('logout-btn').onclick = async () => {
    await auth.signOut();
    window.location.href = 'index.html';
  };

  await loadFinance(profile.id);
  await loadSkills(profile.id);
}

async function loadFinance(studentId){
  const snap = await db.collection('payment_info').doc(studentId).get();
  const info = snap.exists ? snap.data() : null;
  const box = document.getElementById('finance-cards');
  if(!info){
    box.innerHTML = `<div class="stat" style="grid-column:1/-1;"><div class="label">Financeiro ainda não configurado pelo professor</div></div>`;
    return;
  }
  const today = new Date();
  const due = getNextDueDate(info, today);
  const diffDays = Math.ceil((due - today) / 86400000);
  let statusHtml = '<span class="status-tag ok">Em dia</span>';
  let barColor = 'var(--belt-green)';
  if(!info.active){ statusHtml = '<span class="status-tag danger">Inativo</span>'; barColor = 'var(--belt-red)'; }
  else if(diffDays <= 1){ statusHtml = '<span class="status-tag warn">Vence em breve</span>'; barColor = '#C99A2E'; }

  box.innerHTML = `
    <div class="stat"><div class="num mono">R$ ${Number(info.monthly_fee).toFixed(2)}</div><div class="label">Mensalidade</div></div>
    <div class="stat"><div class="num mono">${due.toLocaleDateString('pt-BR')}</div><div class="label">Próximo vencimento</div></div>
    <div class="stat" style="border-left-color:${barColor};"><div class="num" style="font-size:15px;padding-top:4px;">${statusHtml}</div><div class="label">Situação</div></div>
  `;
}

async function loadSkills(studentId){
  const skillsSnap = await db.collection('skills').orderBy('ordem').get();
  const skills = skillsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  if(skills.length === 0) return;

  const logsSnap = await db.collection('skill_logs')
    .where('student_id', '==', studentId)
    .orderBy('recorded_at', 'asc')
    .get();
  const logs = logsSnap.docs.map(d => d.data());

  const latestBySkill = {};
  logs.forEach(row => { latestBySkill[row.skill_id] = row.level; });

  new Chart(document.getElementById('radar-chart'), {
    type: 'radar',
    data: {
      labels: skills.map(s => s.nome),
      datasets: [{
        label: 'Nível atual',
        data: skills.map(s => latestBySkill[s.id] ?? 0),
        backgroundColor: 'rgba(29,78,122,0.18)',
        borderColor: '#1D4E7A',
        pointBackgroundColor: '#1D4E7A'
      }]
    },
    options: {
      scales: { r: { min:0, max:5, ticks:{ stepSize:1, color:'#6C6350', backdropColor:'transparent' },
        grid:{ color:'#C9BE9E' }, angleLines:{ color:'#C9BE9E' }, pointLabels:{ color:'#211D16', font:{ size:11 } } } },
      plugins: { legend: { labels: { color: '#211D16' } } }
    }
  });

  const byDate = {};
  logs.forEach(row => {
    const jsDate = row.recorded_at && row.recorded_at.toDate ? row.recorded_at.toDate() : new Date(row.recorded_at);
    const d = jsDate.toLocaleDateString('pt-BR');
    if(!byDate[d]) byDate[d] = [];
    byDate[d].push(row.level);
  });
  const dates = Object.keys(byDate);
  const avgSeries = dates.map(d => (byDate[d].reduce((a,b)=>a+b,0) / byDate[d].length));

  new Chart(document.getElementById('timeline-chart'), {
    type: 'line',
    data: {
      labels: dates.length ? dates : ['—'],
      datasets: [{
        label: 'Nível médio geral',
        data: avgSeries.length ? avgSeries : [0],
        borderColor: '#1D4E7A',
        backgroundColor: 'rgba(29,78,122,0.12)',
        tension: 0.3,
        fill: true
      }]
    },
    options: {
      scales: {
        y: { min:0, max:5, ticks:{ color:'#6C6350' }, grid:{ color:'#C9BE9E' } },
        x: { ticks:{ color:'#6C6350' }, grid:{ color:'#C9BE9E' } }
      },
      plugins: { legend: { labels: { color: '#211D16' } } }
    }
  });

  document.getElementById('skills-list').innerHTML = skills.map(s => {
    const level = latestBySkill[s.id] ?? 0;
    const dots = [0,1,2,3,4].map(i => `<i class="${i < level ? 'on':''}"></i>`).join('');
    return `<div class="flex-between" style="border-bottom:1px dashed var(--line);padding:10px 0;">
      <div><div style="font-weight:600;font-size:14px;">${s.nome}</div><div class="tag-cat">${s.categoria}</div></div>
      <div class="stripe-tab">${dots}</div>
    </div>`;
  }).join('');
}

auth.onAuthStateChanged((user) => {
  if(!user){ window.location.href = 'index.html'; return; }
  guardAndInit(user);
});
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(() => {}); });
}
</script>
</body>
</html>
