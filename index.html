<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academia • Acesso</title>
<link rel="stylesheet" href="assets/style.css">
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore-compat.js"></script>
<script src="assets/config.js"></script>
</head>
<body>
<div class="auth-screen">
  <div class="auth-card">
    <div class="belt-strip-lg"></div>
    <h1>Área do Aluno &amp; Professor</h1>
    <p class="lead">Entre com seu e-mail. Enviaremos um link mágico de acesso — sem senha.</p>

    <div id="form-box">
      <div class="field">
        <label for="email">E-mail cadastrado</label>
        <input id="email" type="email" placeholder="voce@email.com" autocomplete="email">
      </div>
      <button id="send-btn" class="btn btn-block">Enviar link de acesso</button>
      <div id="msg"></div>
    </div>

    <div id="loading-box" class="hidden" style="text-align:center;padding:20px 0;">
      <p class="small">Verificando sessão…</p>
    </div>
  </div>
</div>

<script>
firebase.initializeApp(window.FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.firestore();

const msg = document.getElementById('msg');
const sendBtn = document.getElementById('send-btn');
const formBox = document.getElementById('form-box');
const loadingBox = document.getElementById('loading-box');

function showMsg(text, type){
  msg.innerHTML = `<div class="msg ${type==='ok'?'msg-ok':'msg-err'}">${text}</div>`;
}

function showLoading(){
  formBox.classList.add('hidden');
  loadingBox.classList.remove('hidden');
}

sendBtn.addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim();
  if(!email){ showMsg('Informe um e-mail válido.', 'err'); return; }
  sendBtn.disabled = true;
  sendBtn.textContent = 'Enviando…';
  const actionCodeSettings = {
    url: window.location.origin + window.location.pathname,
    handleCodeInApp: true
  };
  try {
    await auth.sendSignInLinkToEmail(email, actionCodeSettings);
    window.localStorage.setItem('emailForSignIn', email);
    showMsg('Link enviado! Confira sua caixa de entrada (e o spam) e clique para entrar.', 'ok');
  } catch (error) {
    showMsg('Não foi possível enviar o link: ' + error.message, 'err');
  }
  sendBtn.disabled = false;
  sendBtn.textContent = 'Enviar link de acesso';
});

async function redirectByRole(user){
  showLoading();

  const ref = db.collection('profiles').doc(user.uid);
  const snap = await ref.get();
  let profile;

  // Se o perfil ainda não existir (primeiro login), cria como "aluno" por padrão.
  if(!snap.exists){
    profile = {
      email: user.email,
      full_name: user.email,
      role: 'aluno',
      belt: 'Branca',
      stripes: 0,
      created_at: firebase.firestore.FieldValue.serverTimestamp()
    };
    await ref.set(profile);
  } else {
    profile = snap.data();
  }

  if(profile && profile.role === 'professor'){
    window.location.href = 'professor.html';
  } else {
    window.location.href = 'aluno.html';
  }
}

(async () => {
  // Concluindo login vindo do link mágico (email link)?
  if(auth.isSignInWithEmailLink(window.location.href)){
    let email = window.localStorage.getItem('emailForSignIn');
    if(!email){
      email = window.prompt('Confirme o e-mail usado para pedir o link de acesso:');
    }
    try {
      const result = await auth.signInWithEmailLink(email, window.location.href);
      window.localStorage.removeItem('emailForSignIn');
      window.history.replaceState({}, document.title, window.location.pathname);
      await redirectByRole(result.user);
    } catch (error) {
      showMsg('Não foi possível concluir o login: ' + error.message, 'err');
    }
    return;
  }

  // Sessão já ativa?
  auth.onAuthStateChanged((user) => {
    if(user){ redirectByRole(user); }
  });
})();
</script>
</body>
</html>
